version: '3.8'

services:
  scheduler:
    build: .
    command: python scheduler.py
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    restart: always
    container_name: stock_scheduler

  dashboard:
    build: .
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      - scheduler
    restart: always
    container_name: stock_dashboard